# Mock OpenAI configuration (required for build)
quarkus.langchain4j.openai.api-key=dummy
quarkus.langchain4j.openai.base-url=http://localhost:8080

# Default Infinispan embedding store configuration
quarkus.langchain4j.infinispan.dimension=384
quarkus.langchain4j.infinispan.cache-name=default-embeddings

# Named store 1 configuration
quarkus.langchain4j.infinispan.store1.dimension=384
quarkus.langchain4j.infinispan.store1.cache-name=store1-embeddings

# Named store 2 configuration
quarkus.langchain4j.infinispan.store2.dimension=384
quarkus.langchain4j.infinispan.store2.cache-name=store2-embeddings